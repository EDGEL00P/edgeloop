# NATS JetStream Configuration for Edgeloop v25

# Server name
server_name: "edgeloop-nats"

# Port for client connections
port: 4222

# HTTP monitoring
http_port: 8222

# JetStream configuration
jetstream {
    store_dir: "/store"
    max_mem_store: 2GB
    max_file_store: 10GB
}

# Cluster configuration (for future scaling)
cluster {
    name: "edgeloop-cluster"
    port: 6222
}

# Logging
log_file: "/dev/stdout"
log_time: true
debug: false
trace: false

# Connection limits
max_connections: 10000
max_payload: 10MB

# Ping interval
ping_interval: 20s
ping_max: 2

# Leaf node configuration (for edge devices)
leafnodes {
    remotes [
        {
            url: "nats://leaf.example.com:7422"
            account: "edge"
        }
    ]
}
