version: '3.8'

services:
  # SurrealDB - Multi-model database (Graph + Document + Vector)
  surrealdb:
    image: surrealdb/surrealdb:latest
    container_name: edgeloop-surrealdb
    ports:
      - "8000:8000"  # HTTP endpoint
      - "5432:5432"  # PostgreSQL wire protocol (if needed)
    volumes:
      - surreal-data:/data
    command: start --log trace --user root --pass root file:/data/edgeloop.db
    environment:
      - SURREAL_LOG=trace
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - edgeloop-network

  # NATS JetStream - Message streaming & RPC
  nats:
    image: nats:latest
    container_name: edgeloop-nats
    ports:
      - "4222:4222"  # Client connections
      - "8222:8222"  # HTTP monitoring
      - "6222:6222"  # Cluster routing
    volumes:
      - nats-data:/data
      - nats-storage:/store
      - ./infrastructure/nats/nats.conf:/etc/nats/nats.conf:ro
    command: ["-c", "/etc/nats/nats.conf", "-js", "-sd", "/store"]
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - edgeloop-network

  # NATS Box (Management tool - optional)
  nats-box:
    image: natsio/nats-box:latest
    container_name: edgeloop-nats-box
    depends_on:
      - nats
    networks:
      - edgeloop-network
    stdin_open: true
    tty: true
    command: ["/bin/sh"]

volumes:
  surreal-data:
    driver: local
  nats-data:
    driver: local
  nats-storage:
    driver: local

networks:
  edgeloop-network:
    driver: bridge
