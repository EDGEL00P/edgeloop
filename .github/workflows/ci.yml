name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: "20"
  RUST_VERSION: "stable"

jobs:
  # TypeScript/Next.js checks
  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Typecheck
        run: npm run check

  # Linting
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint
        run: npm run lint

  # Run tests
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests
        run: npm test -- --ci

  # Build Next.js application
  build-nextjs:
    name: Build Next.js
    runs-on: ubuntu-latest
    needs: [typecheck, lint, test]
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Set API URL environment variable
        id: set-api-url
        run: |
          if [ -n "${{ secrets.NEXT_PUBLIC_API_URL }}" ]; then
            echo "api_url=${{ secrets.NEXT_PUBLIC_API_URL }}" >> $GITHUB_OUTPUT
          else
            echo "api_url=http://localhost:3001" >> $GITHUB_OUTPUT
          fi
      
      - name: Build Next.js app
        working-directory: apps/web
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ steps.set-api-url.outputs.api_url }}

  # Rust compilation check
  rust-check:
    name: Rust Compilation Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      
      - name: Check Rust code
        run: cargo check --workspace
        continue-on-error: true

  # Build Rust services
  build-rust:
    name: Build Rust Services
    runs-on: ubuntu-latest
    needs: [rust-check]
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      
      - name: Build el-api
        run: cargo build --release -p el-api

  # Summary job (runs even if some fail)
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [typecheck, lint, test, build-nextjs, rust-check]
    if: always()
    steps:
      - name: Check job status
        run: |
          echo "CI Pipeline completed"
          echo "TypeCheck: ${{ needs.typecheck.result }}"
          echo "Lint: ${{ needs.lint.result }}"
          echo "Test: ${{ needs.test.result }}"
          echo "Build Next.js: ${{ needs.build-nextjs.result }}"
          echo "Rust Check: ${{ needs.rust-check.result }}"
